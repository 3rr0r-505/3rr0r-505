<svg width="100%" viewBox="0 0 680 227" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect fill="#0d1117" x="0" y="0" width="680" height="227" rx="8"/>

  <!-- Animated Border -->
  <rect fill="none"
        stroke="#21262d"
        stroke-width="1.5"
        x="14" y="14"
        width="652"
        height="199"
        rx="4"
        stroke-dasharray="1700"
        stroke-dashoffset="1700">
    <animate attributeName="stroke-dashoffset"
              values="1700;0;0;1700"
              keyTimes="0;0.4;0.8;1"
              dur="10s"
              repeatCount="indefinite"/>
  </rect>

  <!-- Corners -->
  <g stroke="#58a6ff" stroke-width="2">
    <line x1="14" y1="14" x2="34" y2="14"/>
    <line x1="14" y1="14" x2="14" y2="34"/>

    <line x1="646" y1="14" x2="666" y2="14"/>
    <line x1="666" y1="14" x2="666" y2="34"/>

    <line x1="14" y1="193" x2="14" y2="213"/>
    <line x1="14" y1="213" x2="34" y2="213"/>

    <line x1="666" y1="193" x2="666" y2="213"/>
    <line x1="646" y1="213" x2="666" y2="213"/>
  </g>

  <!-- Centered Text -->
  <g transform="translate(340,113)">
    <text font-family="Audiowide, monospace"
          font-size="60"
          fill="#58a6ff"
          text-anchor="middle"
          dominant-baseline="middle">

      <tspan dx="22">

        <!-- 5 -->
        <tspan opacity="0">5
          <animate attributeName="opacity"
            values="0;1;1;1;0.7;0.3;0"
            keyTimes="0;0.05;0.3;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

        <!-- p -->
        <tspan dx="-9" opacity="0">p
          <animate attributeName="opacity"
            values="0;0;1;1;0.7;0.3;0"
            keyTimes="0;0.09;0.13;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

        <!-- y -->
        <tspan dx="-9" opacity="0">y
          <animate attributeName="opacity"
            values="0;0;0;1;1;0.7;0.3;0"
            keyTimes="0;0.13;0.17;0.21;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

        <!-- D -->
        <tspan dx="-9" opacity="0">D
          <animate attributeName="opacity"
            values="0;0;0;0;1;1;0.7;0.3;0"
            keyTimes="0;0.17;0.21;0.25;0.29;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

        <!-- 3 -->
        <tspan dx="-9" opacity="0">3
          <animate attributeName="opacity"
            values="0;0;0;0;0;0.2;0.6;1;1;0.7;0.3;0"
            keyTimes="0;0.21;0.25;0.29;0.33;0.37;0.41;0.45;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

        <!-- R -->
        <tspan dx="-9" opacity="0">R
          <animate attributeName="opacity"
            values="0;0;0;0;0;0;0.2;0.6;1;1;0.7;0.3;0"
            keyTimes="0;0.25;0.29;0.33;0.37;0.41;0.45;0.49;0.53;0.65;0.85;0.93;1"
            dur="10s" repeatCount="indefinite"/>
        </tspan>

      </tspan>

    </text>
  </g>

</svg>